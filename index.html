<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Web Player | betting-simulator</title>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        border: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #231F20;
      }

      body {
        text-align: center;
      }

      #unity-container {
        width: 100%;
        max-width: 100vw;
        margin: 0 auto;
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        max-width: 100%;
        background: #231F20;
      }
    </style>
  </head>

  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width="1600" height="900" tabindex="-1"></canvas>
    </div>

    <script src="Build/01-noData_01-forward.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        document.body.style.textAlign = "left";
      }

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/01-noData_01-forward.data.unityweb",
        frameworkUrl: "Build/01-noData_01-forward.framework.js.unityweb",
        codeUrl: "Build/01-noData_01-forward.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Centre for Gambling Research",
        productName: "betting-simulator",
        productVersion: "0.1.0",
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
