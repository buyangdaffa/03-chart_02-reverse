<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity Web Player | betting-simulator</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #231F20;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #start-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #start-button {
      padding: 14px 24px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: white;
      color: #231F20;
      cursor: pointer;
    }

    #unity-container {
      display: none;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
    }

    #unity-canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #231F20;
    }

    #unity-container:fullscreen {
      width: 100vw;
      height: 100vh;
      max-width: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #unity-container:fullscreen #unity-canvas {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
  </style>
</head>

<body>

  <!-- Start screen -->
  <div id="start-screen">
    <button id="start-button">Start Task (Enter Fullscreen ⤢)</button>
  </div>

  <!-- Unity -->
  <div id="unity-container">
    <canvas id="unity-canvas" width="1600" height="900"></canvas>
  </div>

  <script src="Build/03-chart_02-reverse.loader.js"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");
    const unityContainer = document.querySelector("#unity-container");
    const startScreen = document.querySelector("#start-screen");
    const startButton = document.querySelector("#start-button");

    function enterFullscreenAndStart() {
      // request fullscreen (must be user-triggered)
      if (unityContainer.requestFullscreen) {
        unityContainer.requestFullscreen();
      } else if (unityContainer.webkitRequestFullscreen) {
        unityContainer.webkitRequestFullscreen();
      }

      // show Unity
      startScreen.style.display = "none";
      unityContainer.style.display = "block";

      // load Unity AFTER click (important)
      createUnityInstance(canvas, {
        dataUrl: "Build/03-chart_02-reverse.data.unityweb",
        frameworkUrl: "Build/03-chart_02-reverse.framework.js.unityweb",
        codeUrl: "Build/03-chart_02-reverse.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Centre for Gambling Research",
        productName: "betting-simulator",
        productVersion: "0.1.0",
      }).catch((message) => alert(message));
    }

    startButton.addEventListener("click", enterFullscreenAndStart);
  </script>

</body>
</html>
